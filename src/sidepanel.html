<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Browser Agent</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --bg-card: rgba(255,255,255,0.85);
      --bg-input: #ffffff;
      --border: rgba(0,0,0,0.1);
      --border-light: rgba(0,0,0,0.06);
      --text: #1d1d1f;
      --text2: #6e6e73;
      --text3: #aeaeb2;
      --accent: #007aff;
      --accent-hover: #0071e3;
      --accent-green: #30d158;
      --accent-red: #ff3b30;
      --accent-orange: #ff9f0a;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 2px 16px rgba(0,0,0,0.08);
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
      --font: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ---- 顶栏 ---- */
    .topbar {
      height: 52px;
      background: rgba(245,245,247,0.92);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      flex-shrink: 0;
    }

    .app-icon {
      width: 26px;
      height: 26px;
      background: linear-gradient(135deg, #007aff, #5856d6);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 13px;
      flex-shrink: 0;
    }

    .app-title {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
    }

    .loop-status {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--border-light);
      color: var(--text2);
    }
    .loop-status--running { background: rgba(48,209,88,0.15); color: var(--accent-green); }
    .loop-status--waiting_user { background: rgba(255,159,10,0.15); color: var(--accent-orange); }
    .loop-status--error { background: rgba(255,59,48,0.15); color: var(--accent-red); }
    .loop-status--paused { background: rgba(0,122,255,0.12); color: var(--accent); }
    .loop-status--completed { background: rgba(48,209,88,0.12); color: var(--accent-green); }

    .icon-btn {
      width: 30px; height: 30px;
      border: none; background: none;
      border-radius: 6px; cursor: pointer;
      color: var(--text2); font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .icon-btn:hover { background: var(--border-light); }

    /* ---- 标签栏 ---- */
    .tabs {
      height: 42px;
      background: rgba(245,245,247,0.95);
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 2px;
      flex-shrink: 0;
    }

    .tab-btn {
      height: 30px; padding: 0 14px;
      border: none; background: none;
      border-radius: 8px;
      font-size: 12px; font-weight: 500;
      color: var(--text2); cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn:hover { background: var(--border-light); color: var(--text); }
    .tab-btn.active { background: var(--accent); color: white; }

    /* ---- Tab 面板 ---- */
    .tab-panel {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    /* ---- 工具栏 ---- */
    .toolbar {
      padding: 7px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      border-bottom: 1px solid var(--border-light);
      flex-shrink: 0;
    }

    .toolbar-label { font-size: 11px; color: var(--text2); white-space: nowrap; }

    .tab-select {
      flex: 1; height: 28px; padding: 0 8px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 12px; color: var(--text);
      font-family: var(--font); outline: none;
    }
    .tab-select:focus { border-color: var(--accent); }

    .toolbar-btn {
      height: 28px; padding: 0 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 11px; color: var(--text2);
      cursor: pointer; white-space: nowrap;
      transition: all 0.15s;
    }
    .toolbar-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ---- 进度条 ---- */
    #workflowProgress {
      display: none; padding: 7px 12px;
      background: rgba(0,122,255,0.05);
      border-bottom: 1px solid var(--border-light);
      flex-shrink: 0;
    }
    .progress-info { font-size: 11px; color: var(--accent); margin-bottom: 4px; font-weight: 500; }
    .progress-track { height: 3px; background: rgba(0,122,255,0.15); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

    /* ---- 消息列表 ---- */
    #messages {
      flex: 1; overflow-y: auto;
      padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
      min-height: 0;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message { display: flex; }
    .message--user { justify-content: flex-end; }
    .message--assistant, .message--system { justify-content: flex-start; }

    .bubble {
      max-width: 86%; padding: 9px 12px;
      border-radius: var(--radius);
      font-size: 13px; line-height: 1.55;
      word-break: break-word;
    }

    .message--user .bubble {
      background: var(--accent); color: white;
      border-bottom-right-radius: 4px;
    }
    .message--assistant .bubble {
      background: var(--bg-card); color: var(--text);
      border: 1px solid var(--border-light);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow-sm);
    }

    .bubble code {
      background: rgba(0,0,0,0.06); border-radius: 4px;
      padding: 1px 5px;
      font-family: "SF Mono", "Fira Code", monospace; font-size: 12px;
    }
    .message--user .bubble code { background: rgba(255,255,255,0.2); }
    .bubble p { margin: 0 0 6px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { padding-left: 16px; margin: 4px 0; }
    .bubble li { margin-bottom: 2px; }

    .screenshot-preview { max-width: 100%; border-radius: 8px; margin-bottom: 6px; display: block; }

    .tool-log {
      display: flex; align-items: flex-start; gap: 6px;
      padding: 5px 10px;
      background: rgba(0,0,0,0.03);
      border-radius: 8px; font-size: 11px;
      color: var(--text2);
      border-left: 2px solid var(--accent-green);
    }
    .tool-log--error { border-left-color: var(--accent-red); color: var(--accent-red); }

    /* ---- 介入面板 ---- */
    #interventionPanel {
      display: none; margin: 8px 12px; padding: 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }

    .intervention-question {
      font-size: 13px; font-weight: 500; color: var(--text);
      margin-bottom: 10px; line-height: 1.5;
    }

    #interventionOptions { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }

    .intervention-option {
      padding: 6px 14px;
      background: rgba(0,122,255,0.08);
      border: 1px solid rgba(0,122,255,0.2);
      border-radius: 20px; font-size: 12px;
      color: var(--accent); cursor: pointer;
      transition: all 0.15s;
    }
    .intervention-option:hover { background: var(--accent); color: white; }

    #interventionInputWrap { display: flex; gap: 6px; }

    .intervention-input {
      flex: 1; height: 34px; padding: 0 10px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px; font-family: var(--font); color: var(--text); outline: none;
    }
    .intervention-input:focus { border-color: var(--accent); }

    /* ---- 控制栏 ---- */
    #controlBar {
      display: none; align-items: center; justify-content: center;
      gap: 6px; padding: 8px 12px;
      background: rgba(245,245,247,0.95);
      border-top: 1px solid var(--border-light);
      flex-shrink: 0;
    }

    .ctrl-btn {
      height: 32px; padding: 0 16px;
      border-radius: 20px; border: 1px solid var(--border);
      background: var(--bg-card);
      font-size: 12px; font-weight: 500;
      color: var(--text2); cursor: pointer;
      transition: all 0.15s;
    }
    .ctrl-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .ctrl-btn:disabled { opacity: 0.4; cursor: default; }
    .ctrl-btn--primary { background: var(--accent); color: white; border-color: var(--accent); }
    .ctrl-btn--primary:hover:not(:disabled) { background: var(--accent-hover); color: white; }
    .ctrl-btn--danger { border-color: var(--accent-red); color: var(--accent-red); }
    .ctrl-btn--danger:hover:not(:disabled) { background: var(--accent-red); color: white; }

    /* ---- 输入区 ---- */
    .input-area {
      padding: 10px 12px;
      background: rgba(245,245,247,0.95);
      border-top: 1px solid var(--border-light);
      display: flex; align-items: flex-end; gap: 8px;
      flex-shrink: 0;
    }

    #userInput {
      flex: 1; min-height: 36px; max-height: 300px;
      padding: 8px 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 13px; font-family: var(--font); color: var(--text);
      resize: vertical; outline: none; line-height: 1.4;
      overflow-y: auto; transition: border-color 0.15s;
    }
    #userInput:focus { border-color: var(--accent); }
    #userInput::placeholder { color: var(--text3); }

    #sendBtn {
      width: 34px; height: 34px; border-radius: 50%;
      border: none; background: var(--accent); color: white;
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s, transform 0.1s;
    }
    #sendBtn:hover { background: var(--accent-hover); }
    #sendBtn:active { transform: scale(0.93); }

    /* ---- 工作流面板 ---- */
    .workflow-panel {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .workflow-panel::-webkit-scrollbar { width: 4px; }
    .workflow-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .panel-heading {
      font-size: 11px; font-weight: 600; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.4px; padding: 4px 0;
    }

    .workflow-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 14px; box-shadow: var(--shadow-sm);
      display: flex; flex-direction: column; gap: 6px;
    }

    .wf-header { display: flex; align-items: center; justify-content: space-between; }
    .wf-name { font-size: 13px; font-weight: 600; }
    .wf-steps {
      font-size: 11px; color: var(--text2);
      background: var(--border-light);
      padding: 2px 8px; border-radius: 10px;
    }
    .wf-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }
    .wf-url { font-size: 11px; color: var(--accent); }

    .btn-primary {
      height: 30px; padding: 0 14px;
      background: var(--accent); border: none;
      border-radius: 20px; font-size: 12px; font-weight: 500;
      color: white; cursor: pointer; align-self: flex-start;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    /* ---- 工作流步骤折叠 ---- */
    .wf-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
    .wf-toggle-btn {
      background: none; border: none; font-size: 12px; color: var(--accent);
      cursor: pointer; padding: 0; display: flex; align-items: center; gap: 3px;
    }
    .wf-toggle-btn:hover { opacity: 0.75; }
    .wf-steps-list {
      display: none; margin-top: 10px;
      flex-direction: column; gap: 5px;
    }
    .wf-step-item {
      display: flex; gap: 8px; align-items: flex-start;
      padding: 7px 8px;
      background: rgba(0,0,0,0.02); border-radius: 8px;
    }
    .wf-step-num {
      font-size: 10px; font-weight: 700; color: white;
      background: var(--accent); border-radius: 50%;
      width: 18px; height: 18px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .wf-step-name { font-size: 12px; font-weight: 500; }
    .wf-step-intervention { font-size: 11px; color: var(--text2); margin-top: 2px; }

    /* ---- 候选人卡片 ---- */
    .cand-panel { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-height: 0; }
    .cand-toolbar {
      display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
      padding: 8px 10px; border-bottom: 1px solid var(--border-light); flex-shrink: 0;
    }
    .cand-list { flex: 1; overflow-y: auto; padding: 8px 10px; display: flex; flex-direction: column; gap: 8px; }

    .cand-card {
      background: var(--bg-card); border: 1px solid var(--border-light);
      border-radius: var(--radius); padding: 10px 12px; box-shadow: var(--shadow-sm);
      display: flex; flex-direction: column; gap: 5px;
    }
    .cand-header { display: flex; align-items: center; gap: 6px; }
    .cand-name { font-size: 13px; font-weight: 600; flex: 1; }
    .cand-status {
      font-size: 10px; padding: 2px 7px; border-radius: 8px;
      border: 1px solid; font-weight: 500; flex-shrink: 0;
    }
    .cand-time { font-size: 10px; color: var(--text3); flex-shrink: 0; }
    .cand-meta { font-size: 11px; color: var(--text2); }
    .cand-meta-secondary { color: var(--text3); }
    .cand-notes {
      font-size: 11px; color: var(--text2); line-height: 1.5;
      background: rgba(0,0,0,0.02); border-radius: 6px; padding: 5px 7px;
    }
    .cand-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .cand-tag {
      font-size: 10px; padding: 2px 6px; border-radius: 6px;
      background: rgba(0,122,255,0.08); color: var(--accent);
    }

    /* ---- 活动记录面板 ---- */
    .log-panel {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column;
      min-height: 0;
    }
    .log-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-light);
      flex-shrink: 0;
    }
    .log-filters { display: flex; gap: 4px; }
    .filter-btn {
      height: 26px; padding: 0 10px;
      border: 1px solid var(--border); border-radius: 13px;
      background: none; font-size: 11px; color: var(--text2);
      cursor: pointer; transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
    .clear-log-btn {
      height: 26px; padding: 0 10px;
      border: 1px solid var(--accent-red); border-radius: 13px;
      background: none; font-size: 11px; color: var(--accent-red);
      cursor: pointer; transition: all 0.15s;
    }
    .clear-log-btn:hover { background: var(--accent-red); color: white; }
    .log-list {
      flex: 1; overflow-y: auto; padding: 10px 12px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .log-empty {
      text-align: center; color: var(--text3);
      font-size: 12px; padding: 40px 0;
    }
    .log-entry {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 9px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-sm);
    }
    .log-icon { font-size: 16px; flex-shrink: 0; line-height: 1; }
    .log-content { flex: 1; min-width: 0; }
    .log-title { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-detail { font-size: 11px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-time { font-size: 10px; color: var(--text3); margin-top: 3px; }

    /* ---- 设置面板 ---- */
    .settings-panel {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .settings-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 14px; box-shadow: var(--shadow-sm);
    }
    .settings-card h3 { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .settings-card p { font-size: 12px; color: var(--text2); line-height: 1.6; }

    .open-settings-btn {
      height: 38px; padding: 0 20px;
      background: var(--accent); border: none;
      border-radius: var(--radius-sm);
      color: white; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
    }
    .open-settings-btn:hover { background: var(--accent-hover); }
  </style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar">
  <div class="app-icon">🤖</div>
  <span class="app-title">Browser Agent</span>
  <span class="loop-status loop-status--idle" id="loopStatus">就绪</span>
  <button class="icon-btn" id="settingsBtn" title="设置">⚙️</button>
</div>

<!-- 标签导航 -->
<div class="tabs">
  <button class="tab-btn active" data-tab="chat">💬 对话</button>
  <button class="tab-btn" data-tab="workflow">⚡ 工作流</button>
  <button class="tab-btn" data-tab="log">📋 记录</button>
  <button class="tab-btn" data-tab="candidates">👤 候选人</button>
  <button class="tab-btn" data-tab="settings-tab">🔧 设置</button>
</div>

<!-- 对话标签 -->
<div class="tab-panel" data-tab="chat" style="display:flex">
  <div class="toolbar">
    <span class="toolbar-label">目标页面</span>
    <select id="tabSelector" class="tab-select"></select>
    <button class="toolbar-btn" id="refreshTabsBtn" title="刷新标签列表">↺</button>
    <button class="toolbar-btn" id="createGroupBtn">＋ 分组</button>
  </div>

  <div id="workflowProgress"></div>

  <div id="messages">
    <div class="message message--assistant">
      <div class="bubble">你好！我是你的浏览器助手。<br><br>
        输入任务描述开始，或在「⚡ 工作流」选择预设流程。<br><br>
        <strong>示例：</strong><br>
        • 提取这个页面的所有产品信息并保存为 CSV<br>
        • 打开 zhipin.com 帮我筛选候选人<br>
        • 总结当前页面的主要内容
      </div>
    </div>
  </div>

  <div id="interventionPanel">
    <div class="intervention-question" id="interventionQuestion"></div>
    <div id="interventionOptions"></div>
    <div id="interventionInputWrap">
      <input type="text" id="interventionInput" class="intervention-input" placeholder="请输入..."/>
      <button class="btn-primary" id="interventionSubmit">确认</button>
    </div>
  </div>

  <div id="controlBar">
    <button class="ctrl-btn ctrl-btn--primary" id="btnStart">▶ 开始</button>
    <button class="ctrl-btn" id="btnPause">⏸</button>
    <button class="ctrl-btn ctrl-btn--danger" id="btnStop">⏹ 停止</button>
  </div>

  <div class="input-area">
    <textarea id="userInput" placeholder="输入任务或问题...（Enter 发送，Shift+Enter 换行）" rows="1"></textarea>
    <button id="sendBtn" title="发送">↑</button>
  </div>
</div>

<!-- 工作流标签 -->
<div class="tab-panel" data-tab="workflow">
  <div class="workflow-panel">
    <div class="panel-heading">预设工作流</div>
    <div id="workflowList"></div>
  </div>
</div>

<!-- 记录标签 -->
<div class="tab-panel" data-tab="log">
  <div class="log-panel">
    <div class="log-toolbar">
      <div class="log-filters">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="download">📥 下载</button>
        <button class="filter-btn" data-filter="navigate">🌐 页面</button>
        <button class="filter-btn" data-filter="candidate">👤 候选人</button>
      </div>
      <button class="clear-log-btn" id="clearLogBtn">清空</button>
    </div>
    <div class="log-list" id="activityLog">
      <div class="log-empty">暂无活动记录</div>
    </div>
  </div>
</div>

<!-- 候选人标签 -->
<div class="tab-panel" data-tab="candidates">
  <div class="cand-panel">
    <div class="cand-toolbar">
      <button class="filter-btn active" data-cand-filter="all">全部</button>
      <button class="filter-btn" data-cand-filter="screening">筛选中</button>
      <button class="filter-btn" data-cand-filter="contacted">已沟通</button>
      <button class="filter-btn" data-cand-filter="resume_received">简历</button>
      <button class="filter-btn" data-cand-filter="interview_scheduled">待面试</button>
      <button class="filter-btn" data-cand-filter="passed">通过</button>
    </div>
    <div class="cand-list" id="candidateList">
