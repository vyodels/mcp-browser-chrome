<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPT Browser Agent</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --bg2: #1a1a1a;
      --bg3: #242424;
      --border: #2e2e2e;
      --text: #e8e8e8;
      --text2: #999;
      --accent: #10a37f;
      --accent2: #0d8a6b;
      --danger: #e54b4b;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 13px;
      overflow: hidden;
    }

    /* ---- Header ---- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .logo { width: 20px; height: 20px; fill: var(--accent); }
    .title { font-weight: 600; font-size: 14px; }
    .badge {
      font-size: 10px; padding: 2px 6px;
      background: var(--bg3); border-radius: 10px; color: var(--text2);
    }
    .header-actions { display: flex; gap: 6px; }
    .icon-btn {
      background: none; border: none; color: var(--text2);
      cursor: pointer; padding: 4px; border-radius: 4px;
      display: flex; align-items: center;
      transition: color 0.15s, background 0.15s;
    }
    .icon-btn:hover { color: var(--text); background: var(--bg3); }

    /* ---- Tabs ---- */
    .tabs {
      display: flex; border-bottom: 1px solid var(--border);
      background: var(--bg2); flex-shrink: 0;
    }
    .tab {
      flex: 1; padding: 8px 4px; text-align: center;
      cursor: pointer; font-size: 11px; color: var(--text2);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); background: var(--bg3); }

    /* ---- Panels ---- */
    .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .panel.active { display: flex; }

    /* ---- Chat panel ---- */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message { display: flex; flex-direction: column; gap: 4px; max-width: 100%; }
    .message.user { align-items: flex-end; }
    .message.assistant { align-items: flex-start; }
    .message-bubble {
      padding: 8px 12px; border-radius: var(--radius);
      line-height: 1.5; word-break: break-word; max-width: 92%;
    }
    .user .message-bubble { background: var(--accent); color: #fff; }
    .assistant .message-bubble { background: var(--bg3); color: var(--text); }
    .message-bubble.streaming::after {
      content: '▌'; animation: blink 0.7s infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .message-bubble img { max-width: 100%; border-radius: 4px; margin-top: 6px; }
    .message-time { font-size: 10px; color: var(--text2); }

    .action-log {
      font-size: 11px; color: var(--text2);
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 4px; padding: 6px 10px;
      font-family: monospace; white-space: pre-wrap;
    }
    .action-log.success { border-color: var(--accent); color: var(--accent); }
    .action-log.error { border-color: var(--danger); color: var(--danger); }

    /* ---- Input area ---- */
    .chat-input-area {
      border-top: 1px solid var(--border);
      padding: 10px 12px; background: var(--bg2); flex-shrink: 0;
    }
    .quick-prompts {
      display: flex; gap: 6px; margin-bottom: 8px;
      overflow-x: auto; padding-bottom: 4px;
    }
    .quick-prompts::-webkit-scrollbar { height: 3px; }
    .quick-prompts::-webkit-scrollbar-thumb { background: var(--border); }
    .prompt-chip {
      flex-shrink: 0; padding: 3px 10px; border-radius: 12px;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text2); cursor: pointer; font-size: 11px;
      transition: all 0.15s; white-space: nowrap;
    }
    .prompt-chip:hover { border-color: var(--accent); color: var(--accent); }

    .input-row { display: flex; gap: 6px; align-items: flex-end; }
    textarea#userInput {
      flex: 1; background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius);
      padding: 8px 10px; font-family: var(--font); font-size: 13px;
      resize: none; min-height: 36px; max-height: 120px;
      line-height: 1.5; outline: none; transition: border-color 0.15s;
    }
    textarea#userInput:focus { border-color: var(--accent); }
    textarea#userInput::placeholder { color: var(--text2); }

    .input-actions { display: flex; flex-direction: column; gap: 4px; }
    .send-btn, .screenshot-btn, .page-btn {
      width: 32px; height: 32px; border-radius: 6px;
      border: none; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .send-btn { background: var(--accent); color: #fff; }
    .send-btn:hover { background: var(--accent2); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .screenshot-btn, .page-btn {
      background: var(--bg3); color: var(--text2);
      border: 1px solid var(--border);
    }
    .screenshot-btn:hover, .page-btn:hover { color: var(--text); border-color: var(--accent); }

    /* ---- Skills panel ---- */
    .skills-panel { padding: 12px; overflow-y: auto; gap: 10px; flex-direction: column; }
    .panel-title {
      font-size: 12px; font-weight: 600; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
    }
    .skill-card {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 12px;
      display: flex; flex-direction: column; gap: 6px;
      transition: border-color 0.15s;
    }
    .skill-card:hover { border-color: var(--accent); }
    .skill-card.disabled { opacity: 0.5; }
    .skill-card.error { border-color: var(--danger); }
    .skill-header { display: flex; justify-content: space-between; align-items: center; }
    .skill-name { font-weight: 600; font-size: 13px; }
    .skill-badge {
      font-size: 10px; padding: 2px 6px; border-radius: 8px;
    }
    .skill-badge.active { background: #0d8a6b22; color: var(--accent); }
    .skill-badge.disabled { background: #ffffff11; color: var(--text2); }
    .skill-badge.error { background: #e54b4b22; color: var(--danger); }
    .skill-desc { font-size: 12px; color: var(--text2); line-height: 1.4; }
    .skill-trigger { font-size: 11px; color: var(--text2); font-family: monospace; }
    .skill-actions { display: flex; gap: 6px; margin-top: 4px; }
    .skill-btn {
      padding: 3px 10px; border-radius: 4px; font-size: 11px;
      border: 1px solid var(--border); background: none;
      color: var(--text2); cursor: pointer; transition: all 0.15s;
    }
    .skill-btn:hover { border-color: var(--accent); color: var(--accent); }
    .skill-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
    .add-skill-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px; border-radius: var(--radius);
      border: 1px dashed var(--border); background: none;
      color: var(--text2); cursor: pointer; font-size: 13px;
      transition: all 0.15s; width: 100%;
    }
    .add-skill-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ---- Debug panel ---- */
    .debug-panel { padding: 12px; overflow-y: auto; gap: 10px; flex-direction: column; }
    .debug-info {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px;
      font-family: monospace; font-size: 11px; color: var(--text2);
      overflow-x: auto; white-space: pre-wrap; max-height: 200px;
      overflow-y: auto;
    }
    .debug-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .debug-btn {
      padding: 6px 12px; border-radius: 6px; font-size: 12px;
      border: 1px solid var(--border); background: var(--bg3);
      color: var(--text); cursor: pointer; transition: all 0.15s;
    }
    .debug-btn:hover { border-color: var(--accent); color: var(--accent); }
    .debug-result {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px;
      font-size: 12px; line-height: 1.5; white-space: pre-wrap;
    }

    /* ---- Status bar ---- */
    .status-bar {
      padding: 4px 12px; background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
    }
    .status-dot.busy { background: #f59e0b; animation: pulse 1s infinite; }
    .status-dot.error { background: var(--danger); }
    @keyframes pulse { 50% { opacity: 0.4; } }
    .status-text { font-size: 11px; color: var(--text2); }

    /* ---- Modal ---- */
    .modal-overlay {
      position: fixed; inset: 0; background: #000a;
      display: flex; align-items: center; justify-content: center;
      z-index: 999; display: none;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; width: 90%; max-width: 360px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .modal-title { font-size: 15px; font-weight: 600; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 12px; color: var(--text2); }
    .form-input, .form-textarea {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 8px 10px;
      font-size: 13px; font-family: var(--font); outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-textarea:focus { border-color: var(--accent); }
    .form-textarea { resize: vertical; min-height: 80px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-cancel {
      padding: 7px 14px; border-radius: 6px;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text2); cursor: pointer; font-size: 12px;
    }
    .btn-confirm {
      padding: 7px 14px; border-radius: 6px;
      background: var(--accent); border: none;
      color: #fff; cursor: pointer; font-size: 12px;
    }
    .btn-confirm:hover { background: var(--accent2); }

    .empty-state {
      text-align: center; padding: 30px 20px; color: var(--text2);
      font-size: 12px; line-height: 1.8;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <svg class="logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
      </svg>
      <span class="title">GPT Agent</span>
      <span class="badge" id="modelBadge">gpt-4o</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="clearBtn" title="清空对话">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/>
        </svg>
      </button>
      <button class="icon-btn" id="settingsBtn" title="设置">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="chat">💬 对话</div>
    <div class="tab" data-tab="skills">⚡ Skills</div>
    <div class="tab" data-tab="debug">🔧 调试</div>
  </div>

  <!-- Chat Panel -->
  <div class="panel active" id="panel-chat">
    <div class="chat-messages" id="chatMessages">
      <div class="empty-state">
        👋 你好！我可以帮你操作当前页面。<br/>
        点击 📄 读取页面，或直接告诉我你想做什么。
      </div>
    </div>
    <div class="chat-input-area">
      <div class="quick-prompts" id="quickPrompts"></div>
      <div class="input-row">
        <textarea id="userInput" placeholder="告诉我你想做什么..." rows="1"></textarea>
        <div class="input-actions">
          <button class="page-btn" id="pageBtn" title="读取当前页面">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
            </svg>
          </button>
          <button class="screenshot-btn" id="screenshotBtn" title="截图发给 AI">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
          </button>
          <button class="send-btn" id="sendBtn" title="发送 (Enter)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Skills Panel -->
  <div class="panel" id="panel-skills">
    <div class="skills-panel" style="display:flex;">
      <div class="panel-title">已安装的 Skills</div>
      <div id="skillsList"></div>
      <button class="add-skill-btn" id="addSkillBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        新建 Skill
      </button>
    </div>
  </div>

  <!-- Debug Panel -->
  <div class="panel" id="panel-debug">
    <div class="debug-panel" style="display:flex;">
      <div class="panel-title">DOM 调试器</div>
      <div class="debug-actions">
        <button class="debug-btn" id="snapshotBtn">📸 获取快照</button>
        <button class="debug-btn" id="fullDomBtn">🌲 完整 DOM</button>
        <button class="debug-btn" id="analyzeBtn">🤖 AI 分析</button>
        <button class="debug-btn" id="fixBtn">🔧 AI 修复</button>
      </div>
      <div class="debug-info" id="debugInfo">点击「获取快照」开始调试...</div>
      <div class="panel-title" style="margin-top:8px">AI 分析结果</div>
      <div class="debug-result" id="debugResult">-</div>
    </div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">就绪</span>
  </div>

  <!-- Add Skill Modal -->
  <div class="modal-overlay" id="skillModal">
    <div class="modal">
      <div class="modal-title">新建 Skill</div>
      <div class="form-group">
        <label class="form-label">名称</label>
        <input class="form-input" id="skillName" placeholder="例如：自动回复助手" />
      </div>
      <div class="form-group">
        <label class="form-label">描述</label>
        <input class="form-input" id="skillDesc" placeholder="简短说明这个 Skill 做什么" />
      </div>
      <div class="form-group">
        <label class="form-label">触发关键词（用 | 分隔）</label>
        <input class="form-input" id="skillTrigger" placeholder="回复|留言|评论" />
      </div>
      <div class="form-group">
        <label class="form-label">AI 指令</label>
        <textarea class="form-textarea" id="skillInstructions" placeholder="告诉 AI 在此场景下应该如何工作..." rows="4"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="skillModalCancel">取消</button>
        <button class="btn-confirm" id="skillModalSave">保存</button>
      </div>
    </div>
  </div>

  <script type="module" src="./sidepanel.ts"></script>

<!-- Save debug result as Skill modal -->
<div id="saveDebugSkillModal" class="modal-overlay">
  <div class="modal">
    <h3>💾 保存为 Skill</h3>
    <p style="color:#aaa;font-size:12px;margin:0 0 12px">自动调试成功！将此次修复方案保存为 Skill 以便下次复用。</p>
    <label>Skill 名称</label>
    <input id="debugSkillName" type="text" placeholder="Skill 名称" />
    <label>触发词（多个用 | 分隔）</label>
    <input id="debugSkillTrigger" type="text" placeholder="例：操作失败|找不到元素" />
    <label>说明</label>
    <input id="debugSkillDesc" type="text" placeholder="这个 Skill 做什么" />
    <label>AI 指令（已自动生成）</label>
    <textarea id="debugSkillInstructions" rows="5" style="font-size:11px"></textarea>
    <div class="modal-buttons">
      <button id="debugSkillCancel" class="secondary-btn">取消</button>
      <button id="debugSkillSave" class="primary-btn">保存 Skill</button>
    </div>
  </div>
</div>
</body>
</html>
